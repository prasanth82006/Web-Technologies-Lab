<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time Username Checker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --light: #f9fafb;
      --gray: #6b7280;
      --dark: #111827;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 2.2rem 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 1.9rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 1.05rem;
    }

    .form-container {
      padding: 2.5rem 2rem;
    }

    .form-group {
      margin-bottom: 1.8rem;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 600;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      font-size: 1.05rem;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }

    .icon-left {
      position: absolute;
      left: 16px;
      top: 50px;
      color: var(--gray);
      font-size: 1.3rem;
    }

    .status {
      margin-top: 0.8rem;
      font-size: 0.95rem;
      font-weight: 500;
      min-height: 1.4em;
    }

    .status.loading {
      color: var(--primary);
    }

    .status.available {
      color: var(--success);
    }

    .status.taken {
      color: var(--danger);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1.5rem;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .submit-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1><i class="fas fa-user-check"></i> Sign Up</h1>
    <p>Choose your username instantly</p>
  </div>

  <div class="form-container">
    <form id="signupForm">
      <div class="form-group">
        <label for="username">Username</label>
        <i class="fas fa-user icon-left"></i>
        <input 
          type="text" 
          id="username" 
          placeholder="e.g. prasanth_07" 
          autocomplete="off" 
          required
          minlength="3"
          maxlength="20"
        >
        <div id="status" class="status"></div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>
        Create Account
      </button>
    </form>
  </div>
</div>

<script>
const JSON_FILE = "users.json";
let isChecking = false;
let isAvailable = false;

const usernameInput = document.getElementById("username");
const statusDiv = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
const form = document.getElementById("signupForm");

let timeoutId = null;
usernameInput.addEventListener("input", () => {
  clearTimeout(timeoutId);

  const username = usernameInput.value.trim();

  if (username.length < 3) {
    showStatus("Username must be at least 3 characters", "taken");
    submitBtn.disabled = true;
    return;
  }

  if (username.length > 20) {
    showStatus("Username cannot exceed 20 characters", "taken");
    submitBtn.disabled = true;
    return;
  }

  timeoutId = setTimeout(() => checkUsername(username), 500);
});

async function checkUsername(username) {
  if (isChecking) return;
  isChecking = true;

  showStatus("Checking availability...", "loading");
  submitBtn.disabled = true;

  try {
    const res = await fetch(JSON_FILE + "?t=" + Date.now());
    if (!res.ok) throw new Error("Failed to load user list");

    const users = await res.json();
    const taken = users.some(u => u.username.toLowerCase() === username.toLowerCase());

    if (taken) {
      showStatus("Username already taken 😔", "taken");
      isAvailable = false;
    } else {
      showStatus("Username is available! ✓", "available");
      isAvailable = true;
    }

    submitBtn.disabled = !isAvailable;
  } catch (err) {
    showStatus("Error checking username. Try again.", "taken");
    console.error(err);
    isAvailable = false;
    submitBtn.disabled = true;
  } finally {
    isChecking = false;
  }
}

function showStatus(message, type) {
  statusDiv.textContent = message;
  statusDiv.className = "status " + type;

  if (type === "loading") {
    statusDiv.innerHTML = `<span class="spinner"></span> ${message}`;
  }
}

form.addEventListener("submit", (e) => {
  e.preventDefault();

  if (!isAvailable) {
    showStatus("Please choose an available username", "taken");
    return;
  }

  const username = usernameInput.value.trim();
  alert(`Account created successfully for @${username} 🎉`);

  form.reset();
  submitBtn.disabled = true;
  showStatus("", "");
});
</script>
</body>
</html>
