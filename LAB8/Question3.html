<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Enrollment System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background-color: #f8f9fa;
        }
        .university {
            text-align: center;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #1a3c6d;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #34495e;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background-color: #219653;
        }
        #output {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            min-height: 100px;
            border-left: 5px solid #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Course Enrollment System</h1>

        <div class="form-group">
            <label for="courseName">Course Name:</label>
            <input type="text" id="courseName" value="Web Technologies" placeholder="Enter course name">
        </div>

        <div class="form-group">
            <label for="instructor">Instructor Name:</label>
            <input type="text" id="instructor" value="Dr. Kumar" placeholder="Enter instructor name">
        </div>

        <div class="form-group">
            <label for="seats">Seats Available? (yes/no):</label>
            <input type="text" id="seats" value="yes" placeholder="yes or no">
        </div>

        <button onclick="enroll()">Enroll Now</button>

        <div id="output"></div>
    </div>

    <script>
        class Course {
            constructor(courseName, instructor) {
                this.courseName = courseName;
                this.instructor = instructor;
            }
            displayCourse() {
                return `Course: ${this.courseName}, Instructor: ${this.instructor}`;
            }
        }

        function enroll() {
            const courseName = document.getElementById("courseName").value.trim();
            const instructor = document.getElementById("instructor").value.trim();
            const seatsInput = document.getElementById("seats").value.trim().toLowerCase();

            if (!courseName || !instructor) {
                document.getElementById("output").textContent = "Please enter both course name and instructor.";
                return;
            }

            const seatsAvailable = seatsInput === "yes" || seatsInput === "y";

            const course = new Course(courseName, instructor);
            let output = course.displayCourse() + "\n";

            const enrollPromise = new Promise((resolve, reject) => {
                if (seatsAvailable) {
                    resolve("Enrollment Successful");
                } else {
                    reject("Course Full");
                }
            });

            enrollPromise
                .then(msg => {
                    output += msg;
                    document.getElementById("output").textContent = output;
                    console.log(course.displayCourse());
                    console.log(msg);
                })
                .catch(err => {
                    output += err;
                    document.getElementById("output").textContent = output;
                    console.log(course.displayCourse());
                    console.log(err);
                });
        }
    </script>

</body>
</html>
