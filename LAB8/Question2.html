<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background-color: #f8f9fa;
        }
        .university {
            text-align: center;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #1a3c6d;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        button:hover {
            background-color: #1565c0;
        }
        #output {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            min-height: 100px;
            border-left: 5px solid #1976d2;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Student Grade Calculator</h1>

        <div class="form-group">
            <label for="id">Student ID:</label>
            <input type="text" id="id" value="9742">
        </div>

        <div class="form-group">
            <label for="name">Student Name:</label>
            <input type="text" id="name" value="chethan">
        </div>

        <div class="form-group">
            <label for="department">Department:</label>
            <input type="text" id="department" value="ECE">
        </div>

        <div class="form-group">
            <label for="marks">Marks (0-100):</label>
            <input type="number" id="marks" min="0" max="100" value="90">
        </div>

        <button onclick="calculateGrade()">Calculate Grade</button>

        <div id="output"></div>
    </div>

    <script>
        function calculateGrade() {
            const id = document.getElementById("id").value.trim();
            const name = document.getElementById("name").value.trim();
            const department = document.getElementById("department").value.trim();
            const marksInput = document.getElementById("marks").value.trim();

            if (!id || !name || !department || !marksInput) {
                document.getElementById("output").textContent = "Please fill all fields!";
                return;
            }

            const marks = Number(marksInput);
            if (isNaN(marks) || marks < 0 || marks > 100) {
                document.getElementById("output").textContent = "Please enter valid marks (0-100)";
                return;
            }

            const getGrade = (m) => {
                if (m >= 90) return "S";
                if (m >= 80) return "A";
                if (m >= 70) return "B";
                if (m >= 60) return "C";
                if (m >= 50) return "D";
                return "F";
            };

            const grade = getGrade(marks);

            const student = { id, name, department, marks };
            const updatedStudent = { ...student, grade };

            let result = `${id} ${name} ${department} ${marks}\n\n{ `;

            const entries = Object.entries(updatedStudent);
            entries.forEach(([key, value], index) => {
                const displayValue = typeof value === "string" ? `'${value}'` : value;
                result += `${key}: ${displayValue}`;
                if (index < entries.length - 1) result += ", ";
            });
            result += " }";

            document.getElementById("output").textContent = result;

            console.log(id, name, department, marks);
            console.log(updatedStudent);
        }
    </script>

</body>
</html>
