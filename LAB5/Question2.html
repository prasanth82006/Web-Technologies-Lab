<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library Book Tracker</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #4361ee;
      --primary-dark: #3f37c9;
      --success: #4cc9f0;
      --danger: #f72585;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      color: #212529;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 2rem 2.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.1rem;
      margin-bottom: 0.4rem;
    }

    header p {
      opacity: 0.9;
      font-size: 1.05rem;
    }

    .message {
      padding: 14px 20px;
      margin: 1.5rem 2.5rem 0.5rem;
      border-radius: 8px;
      font-weight: 500;
    }

    .message.success { background: #d4f4dd; color: #1b5e20; }
    .message.error   { background: #ffebee; color: #b71c1c; }
    .message.info    { background: #e3f2fd; color: #0d47a1; }

    .form-section, .table-section {
      padding: 2rem 2.5rem;
    }

    h2 {
      color: var(--primary-dark);
      margin-bottom: 1.4rem;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #444;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
    }

    .radio-group {
      display: flex;
      gap: 2rem;
      margin-top: 0.6rem;
    }

    .radio-group label {
      font-weight: normal;
      cursor: pointer;
    }

    .form-buttons {
      margin-top: 1.8rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    #saveBtn {
      background: var(--primary);
      color: white;
    }

    #saveBtn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .secondary {
      background: #e9ecef;
      color: #495057;
    }

    .secondary:hover {
      background: #dee2e6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f1f3f5;
      color: #495057;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    tr:hover {
      background: #f8f9fa;
    }

    .status-available {
      color: #2e7d32;
      font-weight: 600;
    }

    .status-borrowed {
      color: #d32f2f;
      font-weight: 600;
    }

    .action-btn {
      padding: 8px 14px;
      margin: 0 4px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
    }

    .edit-btn {
      background: #fff3cd;
      color: #856404;
    }

    .edit-btn:hover {
      background: #ffecb3;
    }

    .delete-btn {
      background: #ffebee;
      color: #c62828;
    }

    .delete-btn:hover {
      background: #ffcdd2;
    }

    .required {
      color: #d32f2f;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1><i class="fas fa-book-open"></i> Library Book Tracker</h1>
    <p>Manage your library collection locally using XML</p>
  </header>

  <div id="message" class="message"></div>

  <section class="form-section">
    <h2><i class="fas fa-book-medical"></i> Add / Edit Book</h2>
    <form id="bookForm">
      <input type="hidden" id="editId" value="">
      
      <div class="form-group">
        <label for="bookId">Book ID <span class="required">*</span></label>
        <input type="text" id="bookId" placeholder="B001" required>
      </div>
      
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input type="text" id="title" placeholder="Clean Code" required>
      </div>
      
      <div class="form-group">
        <label for="author">Author <span class="required">*</span></label>
        <input type="text" id="author" placeholder="Robert C. Martin" required>
      </div>
      
      <div class="form-group">
        <label>Status</label>
        <div class="radio-group">
          <label><input type="radio" name="status" value="Available" checked> Available</label>
          <label><input type="radio" name="status" value="Borrowed"> Borrowed</label>
        </div>
      </div>

      <div class="form-buttons">
        <button type="button" id="saveBtn" onclick="saveBook()">
          <i class="fas fa-save"></i> Save Book
        </button>
        <button type="button" class="secondary" onclick="resetForm()">
          <i class="fas fa-eraser"></i> Clear
        </button>
      </div>
    </form>
  </section>

  <section class="table-section">
    <h2><i class="fas fa-list"></i> Books in Library</h2>
    <table id="booksTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Author</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="booksBody"></tbody>
    </table>
  </section>
</div>

<script>
  const XML_FILE = "books.xml";
  let xmlDoc = null;

  window.onload = () => loadBooks();

  function loadBooks() {
    const xhr = new XMLHttpRequest();
    xhr.open("GET", XML_FILE + "?t=" + Date.now(), true);

    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          try {
            xmlDoc = xhr.responseXML;
            if (!xmlDoc || !xmlDoc.documentElement) {
              showMessage("Invalid XML structure", "error");
              return;
            }
            renderBooks();
          } catch (e) {
            showMessage("Error parsing XML: " + e.message, "error");
          }
        } else if (xhr.status === 404) {
          createEmptyXml();
        } else {
          showMessage("Failed to load books (HTTP " + xhr.status + ")", "error");
        }
      }
    };

    xhr.send();
  }

  function createEmptyXml() {
    const empty = `<?xml version="1.0" encoding="UTF-8"?>
<library>
</library>`;

    downloadXml(empty, "books.xml");
    showMessage("books.xml not found → template downloaded.<br>Please place it next to this file and refresh.", "info");
  }

  function renderBooks() {
    const tbody = document.getElementById("booksBody");
    tbody.innerHTML = "";

    const books = xmlDoc.getElementsByTagName("book");

    if (books.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:#777;">No books in library yet</td></tr>';
      return;
    }

    Array.from(books).forEach(book => {
      const id = book.getElementsByTagName("id")[0]?.textContent || "";
      const title = book.getElementsByTagName("title")[0]?.textContent || "";
      const author = book.getElementsByTagName("author")[0]?.textContent || "";
      const status = book.getElementsByTagName("status")[0]?.textContent || "Available";

      const row = document.createElement("tr");
      row.innerHTML = `
        <td><strong>${id}</strong></td>
        <td>${title}</td>
        <td>${author}</td>
        <td class="${status === 'Available' ? 'status-available' : 'status-borrowed'}">
          ${status}
        </td>
        <td>
          <button class="action-btn edit-btn" onclick="editBook('${id}')">
            <i class="fas fa-edit"></i> Edit
          </button>
          <button class="action-btn delete-btn" onclick="deleteBook('${id}')">
            <i class="fas fa-trash-alt"></i> Delete
          </button>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  function saveBook() {
    const id     = document.getElementById("bookId").value.trim();
    const title  = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const status = document.querySelector('input[name="status"]:checked')?.value || "Available";
    const editId = document.getElementById("editId").value;

    if (!id || !title || !author) {
      showMessage("ID, Title and Author are required", "error");
      return;
    }

    if (!xmlDoc) {
      showMessage("XML not loaded", "error");
      return;
    }

    if (!editId) {
      const exists = Array.from(xmlDoc.getElementsByTagName("book"))
        .some(b => b.getElementsByTagName("id")[0]?.textContent === id);
      if (exists) {
        showMessage(`Book with ID ${id} already exists`, "error");
        return;
      }
    }

    if (editId) {
      const book = Array.from(xmlDoc.getElementsByTagName("book"))
        .find(b => b.getElementsByTagName("id")[0]?.textContent === editId);

      if (book) {
        book.getElementsByTagName("title")[0].textContent = title;
        book.getElementsByTagName("author")[0].textContent = author;
        book.getElementsByTagName("status")[0].textContent = status;
        showMessage(`"${title}" updated`, "success");
      }
    } else {
      const newBook = xmlDoc.createElement("book");
      newBook.appendChild(createElement("id", id));
      newBook.appendChild(createElement("title", title));
      newBook.appendChild(createElement("author", author));
      newBook.appendChild(createElement("status", status));

      xmlDoc.documentElement.appendChild(newBook);
      showMessage(`"${title}" added to library`, "success");
    }

    saveAndRefresh();
    resetForm();
  }

  function createElement(tag, text) {
    const el = xmlDoc.createElement(tag);
    el.textContent = text;
    return el;
  }

  function editBook(id) {
    const book = Array.from(xmlDoc.getElementsByTagName("book"))
      .find(b => b.getElementsByTagName("id")[0]?.textContent === id);

    if (book) {
      document.getElementById("bookId").value = id;
      document.getElementById("bookId").disabled = true;
      document.getElementById("title").value = book.getElementsByTagName("title")[0]?.textContent || "";
      document.getElementById("author").value = book.getElementsByTagName("author")[0]?.textContent || "";
      document.querySelector(`input[name="status"][value="${book.getElementsByTagName("status")[0]?.textContent || 'Available'}"]`).checked = true;
      document.getElementById("editId").value = id;

      showMessage(`Editing "${book.getElementsByTagName("title")[0]?.textContent}"`, "info");
    }
  }

  function deleteBook(id) {
    if (!confirm("Delete this book permanently?")) return;

    const book = Array.from(xmlDoc.getElementsByTagName("book"))
      .find(b => b.getElementsByTagName("id")[0]?.textContent === id);

    if (book) {
      xmlDoc.documentElement.removeChild(book);
      saveAndRefresh();
      showMessage("Book removed from library", "success");
    }
  }

  function saveAndRefresh() {
    const xmlString = new XMLSerializer().serializeToString(xmlDoc);
    downloadXml(xmlString, "books.xml");
    renderBooks();
  }

  function downloadXml(content, filename) {
    const blob = new Blob([content], { type: "application/xml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function resetForm() {
    document.getElementById("bookForm").reset();
    document.getElementById("bookId").disabled = false;
    document.getElementById("editId").value = "";
  }

  function showMessage(text, type = "info") {
    const el = document.getElementById("message");
    el.textContent = text;
    el.className = "message " + type;
    setTimeout(() => el.textContent = "", 5000);
  }
</script>
</body>
</html>
